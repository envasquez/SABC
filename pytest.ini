[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options
# Coverage is intentionally NOT enabled here — it adds ~20-40% overhead on
# every run. Pass --cov explicitly (CI does; `run-tests --coverage` does).
# -n auto runs the suite in parallel across CPU cores via pytest-xdist.
addopts =
    -ra
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    -n auto

# Async test configuration
asyncio_default_fixture_loop_scope = function

# Test markers
markers =
    asyncio: Async tests using pytest-asyncio
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, external services)
    routes: Route/endpoint tests
    security: Security tests (CSRF, SQL injection, etc.)
    slow: Slow running tests (skip with -m "not slow")
    skip_ci: Skip in CI environment

# Coverage settings live in pyproject.toml ([tool.coverage.*]) — coverage.py
# does not read [coverage:*] sections from pytest.ini, so duplicating them
# here was dead config.
