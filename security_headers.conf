# Shared browser security headers.
#
# nginx's add_header inheritance is "all or nothing": if a `location` block
# declares ANY add_header of its own, it stops inheriting the server-level
# ones. Including this file inside each browser-facing location block ensures
# these headers are present on every response, regardless of any location-
# specific add_header directives (e.g. Cache-Control on /static/).
#
# `always` makes the header apply to error responses too (4xx/5xx), not just
# 2xx/3xx.
add_header X-Frame-Options DENY always;
add_header X-Content-Type-Options nosniff always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
