events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Allow file uploads up to 15MB
    client_max_body_size 15m;

    # Rate limiting zones (defense-in-depth alongside slowapi in the app).
    # auth_limit:    stricter, for credential-handling endpoints
    # general_limit: looser, blanket cap on everything else
    # Keyed by client IP — uvicorn's --proxy-headers passes the real IP
    # through to the app, but nginx limits use $binary_remote_addr directly,
    # which is the real client IP because nginx terminates TLS.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/m;
    limit_req_status 429;

    upstream app {
        server web:8000;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name saustinbc.com www.saustinbc.com;

        # Block common vulnerability scanners (WordPress, PHP, etc.)
        location ~* \.(php|asp|aspx|jsp|cgi|pl)$ {
            access_log off;
            return 444;
        }
        location ~* ^/(wp-admin|wp-content|wp-includes|wordpress)/ {
            access_log off;
            return 444;
        }
        location ~* ^/\.(env|git|svn|htaccess|htpasswd) {
            access_log off;
            return 444;
        }

        # Allow Let's Encrypt challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name saustinbc.com www.saustinbc.com;

        # SSL certificates
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Block common vulnerability scanners (WordPress, PHP, etc.)
        # Returns 444 (nginx special: close connection without response)
        location ~* \.(php|asp|aspx|jsp|cgi|pl)$ {
            access_log off;
            return 444;
        }
        location ~* ^/(wp-admin|wp-content|wp-includes|wordpress)/ {
            access_log off;
            return 444;
        }
        location ~* ^/\.(env|git|svn|htaccess|htpasswd) {
            access_log off;
            return 444;
        }

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Stricter rate limiting on credential-handling endpoints.
        # 10r/m + burst=5 nodelay means: 5 immediate requests, then 1 every
        # 6s. Slows credential stuffing / brute force long before slowapi
        # (the app-layer limiter) gets involved.
        location = /login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Register endpoint — both /register and the alias /auth/register.
        location ~ ^/(auth/)?register$ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Password-reset endpoints (both request and consume).
        # Uses a regex location so we cover /forgot-password and /reset-password
        # (and any trailing path segments like /reset-password/<token>).
        location ~ ^/(forgot-password|reset-password) {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Proxy to FastAPI app (catch-all). General rate limit applies here.
        location / {
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # Timeout settings for file uploads
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Serve static files directly
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Serve uploaded photos with optimized caching
        # Original photos - 7 day cache
        location /uploads/photos/ {
            alias /usr/share/nginx/html/uploads/photos/;
            expires 7d;
            add_header Cache-Control "public";
            add_header Vary "Accept-Encoding";
        }

        # Thumbnails - immutable cache (filename includes UUID)
        location /uploads/photos/thumbnails/ {
            alias /usr/share/nginx/html/uploads/photos/thumbnails/;
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }

        # Placeholders - immutable cache (tiny files, cache forever)
        location /uploads/photos/placeholders/ {
            alias /usr/share/nginx/html/uploads/photos/placeholders/;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # Other uploads - 7 day cache
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Redirect www to non-www
        if ($host = www.saustinbc.com) {
            return 301 https://saustinbc.com$request_uri;
        }
    }
}
