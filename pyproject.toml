[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N"]
ignore = [
    "F403",  # Star imports (intentional for minimal code)
    "F405",  # May be undefined from star imports
    "E722",  # Bare except (minimal error handling)
    "E501",  # Line too long (SQL queries)
]

[tool.ruff.lint.per-file-ignores]
"app.py" = ["E402"]  # Module level imports after setup - correct pattern for FastAPI
"routes/pages/home.py" = ["N806"]  # SQLAlchemy aliased tables (Angler1, Angler2, Author, Editor) - correct pattern

[tool.ruff.lint.isort]
# `alembic/` is a local migrations directory, so ruff's auto-classifier
# (ruff >= 0.15.14) would otherwise treat `from alembic import command` as
# first-party while leaving `from alembic.config import Config` as third-party,
# which split-groups the imports and trips I001. Pin alembic as third-party.
known-third-party = ["alembic"]

[tool.mypy]
ignore_missing_imports = true
warn_return_any = false
warn_unused_ignores = false
# All error codes now enabled - fixed with targeted type: ignore comments
# Exclude scripts directory to avoid module conflicts
exclude = ["scripts/"]
# Type check all Python files

# Enforce full type annotations (return + params) for the application code.
# Scoped to routes.* and core.* — the test suite (tests/*) is intentionally
# left untyped for now and would surface ~1000 unrelated errors if included.
[[tool.mypy.overrides]]
module = ["routes.*", "core.*"]
disallow_untyped_defs = true
disallow_incomplete_defs = true

[tool.bandit]
# Consumed by the pre-commit bandit hook (`bandit -c pyproject.toml`).
# Skip test code and the local nix package cache.
exclude_dirs = ["tests", ".venv", ".nix-python-packages"]
# B101 = assert_used. Asserts are fine in tests and non-security paths.
skips = ["B101"]

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    ".nix-python-packages/*",
    "*/site-packages/*",
    "*/dist-packages/*",
    "*/__pycache__/*",
    "venv/*",
    "env/*",
    "test_*.py",
    "*_test.py",
    # Jinja2 compiles templates to code objects whose filename is the template
    # path, so coverage traces them. They are not Python — coverage 7.15+ runs
    # ast.parse() on reported files for its HTML report and crashes on template
    # markup (INTERNALERROR: invalid syntax). Exclude templates from coverage.
    "templates/*",
    "*.html",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]
skip_covered = false
precision = 1
fail_under = 70
