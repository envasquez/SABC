services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: sabc-web
    restart: always
    environment:
      DATABASE_URL: postgresql://sabc_user:${DB_PASSWORD:?DB_PASSWORD must be set in .env.production}@postgres:5432/sabc
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env.production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FROM_EMAIL: ${FROM_EMAIL}
      WEBSITE_URL: ${WEBSITE_URL:-https://saustinbc.com}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SENTRY_DSN: ${SENTRY_DSN:-}
      RELEASE_VERSION: ${RELEASE_VERSION:-}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    # Bind only to host loopback: nginx (running on the host or reaching the
    # container network) is the only thing that should reach the app. Other
    # containers still reach it by service name on sabc-network.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./static:/app/static:ro
      - uploads_data:/app/uploads
    networks:
      - sabc-network
    user: "1000:1000"
    command: >
      sh -c "
        echo 'Setting up uploads directory...';
        mkdir -p /app/uploads/photos;
        echo 'Starting server...';
        exec uvicorn app:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
      "

  postgres:
    image: postgres:17-alpine
    container_name: sabc-postgres
    restart: always
    # Bump max_connections above the default 100. The web container runs a
    # single uvicorn worker with a pool budget of 5+10 = 15 conns per container.
    # 200 leaves comfortable headroom for ad-hoc psql sessions, pg_dump backups,
    # and alembic migrations running alongside the live web container on a
    # 2GB+ droplet (each conn ~10MB).
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
    environment:
      POSTGRES_DB: sabc
      POSTGRES_USER: sabc_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env.production}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    # No published ports: postgres is reachable only by other services on the
    # shared sabc-network via the "postgres" service name. Not exposed to the host.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sabc_user -d sabc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sabc-network

  nginx:
    image: nginx:alpine
    container_name: sabc-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-https.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - certbot_webroot:/var/www/certbot:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      - web
    networks:
      - sabc-network

  certbot:
    image: certbot/certbot
    container_name: sabc-certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    command: echo "Certbot container for certificate renewal"

volumes:
  postgres_data:
    driver: local
  nginx_cache:
    driver: local
  certbot_webroot:
    driver: local
  uploads_data:
    driver: local

networks:
  sabc-network:
    driver: bridge
